app-id: com.syntevo.SmartGit
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: smartgit
separate-locales: false
tags:
  - proprietary
finish-args:
  - --device=dri
  - --env=SMARTGIT_JAVA_HOME=/app/extra/jre
  - --filesystem=home
  - --filesystem=xdg-run/gnupg:ro
  - --filesystem=xdg-run/keyring
  - --share=ipc
  - --share=network
  - --socket=gpg-agent
  - --socket=ssh-auth
  - --socket=x11
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.FileManager1
modules:
  - name: smartgit
    build-commands:
      - install -Dm644 ${FLATPAK_ID}.desktop -t /app/share/applications/
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 ${FLATPAK_ID}.svg -t /app/share/icons/hicolor/scalable/apps/
      - install -Dm755 post-install-setup.sh /app/bin/apply_extra
      - install -Dm755 entrypoint.sh /app/bin/smartgit
    buildsystem: simple
    sources:
      - type: extra-data
        filename: smartgit-linux.tar.gz
        sha256: 97a61d266d3d9daf77a0a6c4e47af8001408c29fa72347327b81c024d8957e07
        size: 124223192
        url: https://download.smartgit.dev/smartgit/smartgit-26_1_045-linux-amd64.tar.gz
        x-checker-data:
          type: html
          url-template: https://download.smartgit.dev/smartgit/smartgit-${version}-linux-amd64.tar.gz
          url: https://www.smartgit.dev/download/
          version-pattern: smartgit-([\d_]+)-linux-amd64.tar.gz
      - type: file
        path: com.syntevo.SmartGit.desktop
      - type: file
        path: com.syntevo.SmartGit.metainfo.xml
      - type: file
        path: com.syntevo.SmartGit.svg
      - type: file
        path: entrypoint.sh
      - type: script
        commands:
          - bsdtar -x -f smartgit-linux.tar.gz --strip-components=2
          - rm smartgit-linux.tar.gz
        dest-filename: post-install-setup.sh
